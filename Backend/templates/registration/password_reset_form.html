<!DOCTYPE html>
<html>
<head>
    <title>Réinitialisation du mot de passe - AgriConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <h2 class="text-center mb-4">Réinitialisation du mot de passe</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_email" class="form-label">Adresse email</label>
                    <input type="email" name="email" id="id_email" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Envoyer le lien</button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'admin_dashboard:login' %}">Retour à la connexion</a>
            </div>
        </div>
    </div>
</body>
</html>
