{% extends 'admin_dashboard/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6 col-lg-5">
        <div class="card card-custom">
            <div class="card-header bg-white border-bottom py-3">
                <h5 class="mb-0 fw-bold"><i class="fas fa-key text-warning me-2"></i>Modifier mon mot de passe</h5>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label text-muted fw-semibold small">Nouveau mot de passe</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" name="new_password" class="form-control bg-light" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted fw-semibold small">Confirmer le mot de passe</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-check-double text-muted"></i></span>
                            <input type="password" name="confirm_password" class="form-control bg-light" required>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2 pt-2">
                        <button type="submit" class="btn btn-success flex-grow-1 fw-medium shadow-sm">
                            <i class="fas fa-save me-2"></i>Enregistrer
                        </button>
                        <a href="{% url 'admin_dashboard:user_list' %}" class="btn btn-light border fw-medium text-secondary">
                            Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
