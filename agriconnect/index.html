<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AgriConnect – La marketplace agricole qui connecte fermiers et acheteurs"
    />
    <title>AgriConnect</title>

    <!-- ✅ Favicon dans TOUS les formats que les navigateurs cherchent -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Préconnexions -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />

    <!-- Google Fonts — NON BLOQUANT -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      />
    </noscript>

    <!-- Preload hero image -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?w=828&q=65&auto=format&fit=crop&fm=webp"
      imagesrcset="
        https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?w=640&q=60&auto=format&fit=crop&fm=webp   640w,
        https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?w=828&q=65&auto=format&fit=crop&fm=webp   828w,
        https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?w=1080&q=68&auto=format&fit=crop&fm=webp 1080w
      "
      imagesizes="100vw"
      fetchpriority="high"
    />

    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: #fafaf9;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
