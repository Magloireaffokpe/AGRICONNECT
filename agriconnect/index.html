<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AgriConnect – La marketplace agricole qui connecte fermiers et acheteurs"
    />
    <title>AgriConnect</title>

    <!-- ✅ 1. Préconnexion Unsplash AVANT Google Fonts -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ✅ 2. Police locale en fallback immédiat — évite le blocage de 750ms
         On charge Poppins en display=swap ET on met une police système en attendant -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      />
    </noscript>

    <!-- ✅ 3. Preload du hero image — CRITIQUE pour LCP
         On précharge directement la bonne taille selon la largeur d'écran -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?w=828&q=60&auto=format&fit=crop&fm=webp"
      imagesrcset="
        https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?w=640&q=60&auto=format&fit=crop&fm=webp  640w,
        https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?w=828&q=65&auto=format&fit=crop&fm=webp  828w,
        https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?w=1080&q=70&auto=format&fit=crop&fm=webp 1080w,
        https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?w=1280&q=72&auto=format&fit=crop&fm=webp 1280w
      "
      imagesizes="100vw"
      fetchpriority="high"
    />

    <!-- ✅ 4. CSS critique inline — évite le blocage du render par le CSS externe -->
    <style>
      /* Police système pendant le chargement de Poppins */
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        background: #fafaf9;
      }
      /* Placeholder hero pour éviter le layout shift */
      .hero-placeholder {
        min-height: 92vh;
        background: #1c1917;
      }
    </style>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
